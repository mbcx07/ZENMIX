<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ZENMIX — Hipnosis Subliminal</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<meta name="description" content="Hipnosis subliminal con frecuencias binaurales y efectos 3D — 100% gratis">
<link rel="stylesheet" href="animations.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#0a0a1a;--card:#1a1a2e;--border:#252540;--accent:#a78bfa;--accent2:#7c3aed;--text:#e0e0e0;--dim:#888;--nav:#111118;--glow:rgba(167,139,250,.15)}
.light{--bg:#f0f0f8;--card:#fff;--border:#ddd;--accent:#7c3aed;--accent2:#6d28d9;--text:#222;--dim:#666;--nav:#fff;--glow:rgba(124,58,217,.1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background .4s,color .4s;display:flex;flex-direction:column}
.app-header{display:flex;align-items:center;padding:6px 10px;background:var(--nav);border-bottom:1px solid var(--border);gap:4px;z-index:100;min-height:40px}
.app-header h1{font-size:.9em;color:var(--accent);flex:1;font-weight:600}
.app-header h1 span{color:var(--accent2)}
.tab-btn{padding:4px 7px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--dim);font-size:.62em;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:var(--glow)}
.icon-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:.7em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.page{display:none;flex-direction:column;padding:8px 10px;gap:8px;min-height:100%}
.page.active{display:flex}
canvas#zenViz{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;transition:opacity .6s}
.session-active canvas#zenViz{opacity:.5;pointer-events:auto}
.card{background:var(--card);border-radius:12px;padding:12px;cursor:pointer;border:1px solid var(--border);transition:all .25s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 18px var(--glow)}
.card h3{font-size:.82em;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.card p{font-size:.68em;color:var(--dim);line-height:1.4}
.section-title{font-size:.7em;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:4px 0}
.voice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
.vcard{background:var(--card);border-radius:8px;padding:5px 3px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .15s;font-size:.65em}
.vcard.sel{border-color:var(--accent);background:var(--glow)}
.vcard .nm{font-weight:500}.vcard .inf{font-size:.75em;color:var(--dim)}
.speed-bar{display:flex;gap:3px;flex-wrap:wrap}
.sopt{padding:4px 8px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--dim);font-size:.6em;cursor:pointer}
.sopt.sel{border-color:var(--accent);color:var(--accent);background:var(--glow)}
.slider-row{display:flex;align-items:center;gap:6px;margin:2px 0}
.slider-row label{font-size:.62em;color:var(--dim);min-width:50px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:2px}
.slider-row span{font-size:.6em;color:#666;min-width:26px;text-align:right}
textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:.72em;outline:none;min-height:60px;resize:vertical;font-family:inherit}
.btn-primary{width:100%;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:.8em;font-weight:600;cursor:pointer}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5}
.btn-outline{width:100%;padding:7px;border:1px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);font-size:.68em;cursor:pointer;margin-top:4px}
.zen-player{text-align:center}
.zen-circle{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:2em;margin:0 auto;animation:breatheCircle 4s ease-in-out infinite}
.zen-circle.playing{border-color:var(--accent2);box-shadow:0 0 30px var(--glow)}
.timer{font-size:1.5em;color:var(--accent);font-weight:300;text-align:center}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;cursor:pointer}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s linear;width:0}
.player-ctrls{display:flex;gap:8px;align-items:center;justify-content:center}
.play-btn{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:1.3em;cursor:pointer}
.play-btn:active{transform:scale(.93)}
.stop-btn{width:34px;height:34px;border-radius:50%;border:2px solid #555;background:transparent;color:var(--dim);font-size:.8em;cursor:pointer}
.rec-btn{width:56px;height:56px;border-radius:50%;border:3px solid #f44336;background:transparent;color:#f44336;font-size:1.3em;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto}
.rec-btn.recording{background:#f44336;color:#fff;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes breatheCircle{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.bcard{background:var(--card);border-radius:8px;padding:6px 3px;text-align:center;border:1px solid var(--border);cursor:pointer;font-size:.6em}
.bcard.active{border-color:var(--accent2);background:var(--glow)}
.bcard .ic{font-size:1.4em}.bcard .nm{margin-top:1px}.bcard .fr{color:var(--dim)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat-card{background:var(--card);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:1.3em;color:var(--accent);font-weight:700}
.stat-card .lbl{font-size:.55em;color:var(--dim)}
</style>
</head>
<body>
<div class="app-header">
  <h1>ZEN<span>MIX</span></h1>
  <button class="tab-btn active" onclick="switchTab('home')">🏠</button>
  <button class="tab-btn" onclick="switchTab('session')">🧘</button>
  <button class="tab-btn" onclick="switchTab('custom')">✨</button>
  <button class="tab-btn" onclick="switchTab('record')">🎤</button>
  <button class="tab-btn" onclick="switchTab('brain')">🧠</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊</button>
  <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>

<div class="main-content">
  <div class="page active" id="page-home"></div>
  <div class="page" id="page-session"></div>
  <div class="page" id="page-custom"></div>
  <div class="page" id="page-record"></div>
  <div class="page" id="page-brain"></div>
  <div class="page" id="page-stats"></div>
</div>

<canvas id="zenViz"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="visualizer.js"></script>
<script src="app.js"></script>
</body>
</html>
