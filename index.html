<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenMix Studio — Meditaciones Binaurales</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#1a241a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZenMix">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sage: {
                50: '#f4f7f4', 100: '#e5ebe5', 200: '#cedbcd',
                300: '#abc1aa', 400: '#84a183', 500: '#648263',
                600: '#4e674d', 700: '#3d523d', 800: '#2d3d2d', 900: '#1a241a',
              },
              sand: {
                50: '#fdfcfb', 100: '#f7f3ed', 200: '#eee6d3',
                300: '#e3d6b8', 400: '#d1b98f', 500: '#b89a6b',
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1); }
      input[type="range"] { accent-color: #4e674d; height: 6px; border-radius: 10px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(78,103,77,0.4); } 50% { box-shadow: 0 0 0 12px rgba(78,103,77,0); } }
      .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
      .animate-slide-right { animation: slideInRight 0.5s ease forwards; }
      .animate-zoom-in { animation: zoomIn 0.4s ease forwards; }
      .animate-slide-up { animation: slideUp 0.4s ease forwards; }
      @media (max-width: 768px) {
        .mobile-full { width: 100% !important; }
        .mobile-stack { flex-direction: column !important; }
        .mobile-hide { display: none !important; }
        .mobile-pad { padding-left: 12px !important; padding-right: 12px !important; }
        input[type="number"] { font-size: 16px !important; }
      }
      @media (max-width: 640px) {
        .sm-hide { display: none !important; }
        .sm-full { width: 100% !important; }
      }
    </style>
    <!-- PWA: service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
