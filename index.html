    <title>ZenMix Pro - Studio Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sage: {
                50: '#f4f7f4',
                100: '#e5ebe5',
                200: '#cedbcd',
                300: '#abc1aa',
                400: '#84a183',
                500: '#648263',
                600: '#4e674d',
                700: '#3d523d',
                800: '#2d3d2d',
                900: '#1a241a',
              },
              sand: {
                50: '#fdfcfb',
                100: '#f7f3ed',
                200: '#eee6d3',

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f7f3ed;
        color: #1a241a;
      }
      .glass {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      input[type="range"] {
        accent-color: #4e674d;
        height: 6px;
        border-radius: 10px;
      }
      .studio-card {
        background: white;
        border: 2px solid #cedbcd;
        box-shadow: 0 4px 0 0 #cedbcd;
      }
      .dark-studio-card {
        background: #1a241a;
        color: white;
        border: 1px solid #4e674d;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }
